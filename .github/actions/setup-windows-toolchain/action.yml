name: 'Setup Windows Toolchain'
description: 'Configure msbuild, MPI, ccache, ninja, and MSVC'
runs:
  using: 'composite'
  steps:
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: 'latest'
    - name: Setup MPI
      uses: mpi4py/setup-mpi@v1
      with:
        mpi: msmpi
    - name: Setup ccache
      uses: Chocobo1/setup-ccache-action@v1
      with:
        windows_compile_environment: msvc
    # Avoid seanmiddleditch/gha-setup-ninja: GitHub release ZIP can be truncated
    # (Invalid zip format / No END header), breaking the whole Windows job.
    - name: Setup ninja
      shell: pwsh
      run: |
        if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
          choco install ninja -y --no-progress
        }
        ninja --version
    - name: Setup MSVC for Ninja again
      uses: ilammy/msvc-dev-cmd@v1
